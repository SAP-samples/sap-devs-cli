project_name: sap-devs

version: 2

github_urls:
  api: https://github.tools.sap/api/v3/
  upload: https://github.tools.sap/
  download: https://github.tools.sap/

release:
  github:
    owner: developer-relations
    name: sap-devs-cli

builds:
  - main: .
    binary: sap-devs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -X github.tools.sap/developer-relations/sap-devs-cli/cmd.Version={{ .Version }}

archives:
  - id: archives
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: false
    files:
      - none*
  - id: binaries
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
