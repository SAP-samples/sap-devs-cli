id: claude-code
name: Claude Code
type: file-inject
targets:
  - scope: global
    path: "~/.claude/CLAUDE.md"
    mode: replace-section
    section: "SAP Developer Context"
  - scope: project
    path: "./CLAUDE.md"
    mode: replace-section
    section: "SAP Developer Context"
detect:
  - command: "claude --version"
  - path: "~/.claude"
mcp_config:
  path: "~/.claude/settings.json"
  format: json
  key: "mcpServers"
hook_config:
  path: "~/.claude/settings.json"
  format: json
  key: "hooks.SessionStart"
skill_config:
  path: "~/.claude/skills"
