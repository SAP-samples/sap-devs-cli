id: continue
name: Continue.dev
type: file-inject
targets:
  - scope: global
    path: "~/.continue/sap-context.md"
    mode: replace-section
    section: "SAP Developer Context"
  - scope: project
    path: ".continue/sap-context.md"
    mode: replace-section
    section: "SAP Developer Context"
detect:
  - path: "~/.continue"
mcp_config:
  path: "~/.continue/config.yaml"
  format: json
  key: "mcpServers"
