<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sap-devs Dashboard</title>
    <link rel="stylesheet" href="css/sap_horizon.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="css/sap_horizon_dark.css" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="css/fundamental-styles.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="panel-header">
        <svg class="logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="6" fill="var(--sapBrandColor, #0a6ed1)"/>
            <text x="14" y="19" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" font-family="72, Segoe UI, system-ui">S</text>
        </svg>
        <span class="title">sap-devs</span>
        <span class="version" id="version">v...</span>
    </div>

    <div class="status-card">
        <div class="card-title">Sync Status</div>
        <div class="card-row">
            <span class="label">Status</span>
            <span class="badge-neutral" id="sync-status-badge">Loading...</span>
        </div>
        <div class="card-row">
            <span class="label">Last synced</span>
            <span class="value" id="last-synced">&mdash;</span>
        </div>
        <div class="card-row">
            <span class="label">Content categories</span>
            <span class="value" id="pack-count">&mdash;</span>
        </div>
    </div>

    <div class="profile-card">
        <div class="card-title">Profile</div>
        <div class="card-row">
            <span class="label">Active profile</span>
            <span class="value" id="profile-name">&mdash;</span>
        </div>
        <div class="card-row">
            <span class="label">Profile ID</span>
            <span class="value" id="profile-id">&mdash;</span>
        </div>
    </div>

    <div class="action-buttons">
        <button type="button" class="fd-button fd-button--emphasized" id="btn-sync">Sync Now</button>
        <button type="button" class="fd-button" id="btn-inject">Inject Now</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
