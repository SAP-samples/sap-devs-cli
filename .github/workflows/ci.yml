name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Install X11 dev headers (required by golang.design/x/clipboard)
        run: sudo apt-get install -y libx11-dev
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - run: go test ./...
      - run: |
          VERSION=$(git describe --tags --always --dirty)
          go build -ldflags "-X github.tools.sap/developer-relations/sap-devs-cli/cmd.Version=${VERSION}" -o sap-devs .
